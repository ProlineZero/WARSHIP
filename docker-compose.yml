services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-warship_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-warship_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  centrifugo:
    image: centrifugo/centrifugo:v6
    command: centrifugo --config=/centrifugo/config.json
    ports:
      - "8001:8001"
    volumes:
      - ./config/centrifugo.json:/centrifugo/config.json:ro
    env_file:
      - .env
    environment:
      CENTRIFUGO_CLIENT_TOKEN_HMAC_SECRET_KEY: ${CENTRIFUGO_HMAC_SECRET_KEY}
      CENTRIFUGO_HTTP_API_KEY: ${CENTRIFUGO_API_KEY}
      CENTRIFUGO_ENGINE_TYPE: redis
      CENTRIFUGO_ENGINE_REDIS_ADDRESS: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      CENTRIFUGO_API_URL: http://centrifugo:8001/api
      CENTRIFUGO_PROXY_SECRET: ${CENTRIFUGO_PROXY_SECRET:-dev-proxy-secret}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      centrifugo:
        condition: service_started

volumes:
  postgres_data:
